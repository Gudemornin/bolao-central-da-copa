<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Teste API - Copa 2026</title>
    <style>
        body {
            background: #0a1628;
            color: #fff;
            font-family: Arial;
            padding: 20px;
        }
        button {
            background: #1b4fd8;
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 8px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 16px;
        }
        button:hover {
            background: #3b82f6;
        }
        pre {
            background: #0e1f3d;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

   <button onclick="testarAPI('competitions/WC')">
    🌎 Copa
</button>

<button onclick="testarAPI('competitions/WC/standings')">
    📊 Classificação
</button>

<button onclick="testarAPI('competitions/WC/matches')">
    ⚽ Jogos
</button>

<button onclick="testarAPI('competitions/WC/teams')">
    👥 Times
</button>

    <h2>Resultado:</h2>
    <pre id="resultado">Clique em um botão para testar...</pre>

    <script>
async function testarAPI(endpoint) {
    const resultado = document.getElementById('resultado');
    resultado.textContent = 'Carregando...';

    try {
        const url = `/api/football?endpoint=${endpoint}`;

        const response = await fetch(url);

        if (!response.ok) {
            throw new Error(`Erro HTTP: ${response.status}`);
        }

        const data = await response.json();

        resultado.textContent = JSON.stringify(data, null, 2);

        // Resumo classificação
        if (endpoint === 'standings' && data.response) {
            const grupos = data.response[0]?.league?.standings;

            if (grupos) {
                console.log('Grupos encontrados:', grupos.length);

                grupos.forEach(grupo => {
                    console.log('--- Grupo', grupo[0]?.group, '---');

                    grupo.forEach(time => {
                        console.log(
                            `${time.rank}. ${time.team.name} - ${time.points} pts`
                        );
                    });
                });
            }
        }

    } catch (error) {
        resultado.textContent = 'Erro: ' + error.message;
        console.error(error);
    }
}
</script>
</body>
</html>
